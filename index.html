async function supaFetch(path, options = {}) {
  if (!supabaseEnabled()) return null;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
      ...options,
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", Prefer: options.prefer || "", ...options.headers },
    });
    if (!res.ok) return null;
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  } catch (e) { return null; }
}

async function loadLeaderboard() {
  const data = await supaFetch("/leaderboard?select=player_name,score,played_at&order=score.desc&limit=10");
  if (Array.isArray(data)) return data.map((r) => ({ name: r.player_name, score: r.score }));
  return [];
}

async function upsertBestScore(name, score) {
  if (!supabaseEnabled() || !name || typeof score !== "number" || !isFinite(score)) return;
  const capped = Math.max(-10000000, Math.min(100000000, Math.round(score)));
  const existing = await supaFetch(`/leaderboard?player_name=eq.${encodeURIComponent(name)}&select=score`);
  if (Array.isArray(existing) && existing.length > 0) {
    if (capped > existing[0].score) {
      await supaFetch(`/leaderboard?player_name=eq.${encodeURIComponent(name)}`, {
        method: "PATCH", prefer: "return=minimal",
        body: JSON.stringify({ score: capped, played_at: new Date().toISOString() }),
      });
    }
  } else {
    await supaFetch("/leaderboard", {
      method: "POST", prefer: "return=minimal",
      body: JSON.stringify({ player_name: name, score: capped }),
    });
  }
}

// ——— LOCAL STORAGE WRAPPER (works in Claude artifacts + standalone) ———
const store = {
  async get(key) {
    try {
      if (typeof window !== "undefined" && window.storage && typeof window.storage.get === "function") {
        const res = await window.storage.get(key);
        return res && res.value ? res.value : null;
      }
      return localStorage.getItem(key);
    } catch (e) { return null; }
  },
  async set(key, value) {
    try {
      if (typeof window !== "undefined" && window.storage && typeof window.storage.set === "function") {
        await window.storage.set(key, value);
      } else {
        localStorage.setItem(key, value);
      }
    } catch (e) {}
  },
};

function safeParse(json, fallback) {
  try { return json ? JSON.parse(json) : fallback; } catch (e) { return fallback; }

  "fuck","shit","cunt","dick","cock","piss","twat","wank","arse","tits",
  "bitch","slut","whore","prick","bollocks","bastard",
  "nigger","nigga","niga","nigg","chink","spic","kike","gook","wetback",

]);
const LEET_MAP = { "0":"o","1":"i","3":"e","4":"a","5":"s","7":"t","@":"a","$":"s","!":"i" };

function normaliseForCheck(str) {
  return str.toLowerCase().replace(/[0134579@$!]/g, (c) => LEET_MAP[c] || c).replace(/[^a-z]/g, "");
}
function containsProfanity(name) {
  const norm = normaliseForCheck(name);
  for (const word of BLOCKED_WORDS) { if (norm.includes(word)) return true; }
  return false;
}
function sanitiseName(raw) {
  return raw.replace(/<[^>]*>/g, "").replace(/[^a-zA-Z0-9 \-_]/g, "").slice(0, 20);
}

function generatePrices() {
  return ITEMS.map((item) => {
    const mult = 0.2 + Math.random() * item.volatility;
    return Math.max(1, Math.round(item.basePrice * mult));
  });
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function generateAvail() {
  const avail = ITEMS.map(() => true);
  const r = Math.random();
  const hideCount = r < 0.60 ? 0 : r < 0.85 ? 1 : r < 0.95 ? 2 : 3;
  if (hideCount === 0) return avail;
  const indices = [...Array(ITEMS.length).keys()];
  for (let i = 0; i < hideCount; i++) {
    const p = Math.floor(Math.random() * indices.length);
    avail[indices[p]] = false;
    indices.splice(p, 1);
  }
  return avail;
}

function getInitialState() {
  const prices = generatePrices();
  const drugAvail = generateAvail();

function totalInventory(inv) { return inv.reduce((a, b) => a + b, 0); }
function netWorth(s) { return s.cash + s.bank - s.debt; }

function dayMsg(day) {
  if (day === 25) return "⏰ 5 days left. Time's running out.";
  if (day === 27) return "⏰ 3 days left. Make it count.";
  if (day === 29) return "⏰ Tomorrow's your last day. Sell everything or go broke.";
  if (day === 30) return "⏰ LAST DAY. Cash out or lose everything.";
  return null;
}

      // Tip target — random borough + location for actionable tips
      const tipBoroughIdx = Math.floor(Math.random() * BOROUGHS.length);
      const tipLocIdx = Math.floor(Math.random() * BOROUGHS[tipBoroughIdx].locations.length);
      const tipLocationName = BOROUGHS[tipBoroughIdx].locations[tipLocIdx];
      let msg = pick(ev.msgs).replace(/{item}/g, itemName).replace(/{location}/g, locName).replace(/{area}/g, areaName)
        .replace(/{tipLocation}/g, tipLocationName)
        .replace(/{qty}/g, qty).replace(/{lowprice}/g, lowprice.toLocaleString())
        .replace(/{smallcash}/g, smallcash.toLocaleString()).replace(/{bigcash}/g, bigcash.toLocaleString())
        .replace(/{lostcash}/g, lostcash.toLocaleString()).replace(/{coatprice}/g, coatprice.toLocaleString());

      switch (ev.effect) {
        case "price_change": {
          const newsType = msg.endsWith("|spike") ? "spike" : "crash";
          msg = msg.replace(/\|(spike|crash)$/, "");
          setGs((prev) => ({
            ...prev, eventMsg: msg, eventType: "neutral", eventFades: true,
            pendingNews: { itemIdx, borough: randBoroughIdx, location: randLocIdx, type: newsType },
            popup: mkPopup(ev.title, ev.icon, msg, [{ label: "OK", action: "dismiss" }]),
          })); return;
        }

        case "mega_spike":
          setGs((prev) => ({
            ...prev, eventMsg: `🔥 ${itemName} prices going MENTAL around ${locName}!`, eventType: "good", eventFades: true,
            pendingNews: { itemIdx, borough: randBoroughIdx, location: randLocIdx, type: "mega" },
            popup: mkPopup(ev.title, ev.icon, msg, [{ label: "Let's go!", action: "dismiss" }]),
          })); return;

        case "character_deal": {
          if (msg.includes("hands you") || msg.includes("ops slipping")) {
            SFX.lucky();
            const btnLabel = msg.includes("ops slipping") ? "Say less" : "Thanks nan!";
            setGs((p) => ({ ...p, cash: p.cash + smallcash, eventMsg: msg, eventType: "good", popup: mkPopup(ev.title, ev.icon, msg, [{ label: btnLabel, action: "dismiss" }]) }));
          } else if (msg.includes("Filth") || msg.includes("nods at you") || msg.includes("keep it moving")) {
            const btn = msg.includes("nods at you") ? "Respect" : msg.includes("keep it moving") ? "Swerve" : "Cheers love";
            setGs((p) => ({ ...p, eventMsg: msg, eventType: "neutral", eventFades: true, popup: mkPopup(ev.title, ev.icon, msg, [{ label: btn, action: "dismiss" }]) }));
          } else {
            setGs((prev) => {
              const space = prev.capacity - totalInventory(prev.inventory);
              const canBuy = prev.cash >= lowprice && space >= qty;
              return { ...prev, eventMsg: msg, eventType: "neutral", popup: mkPopup(ev.title, ev.icon, msg,
                canBuy
                  ? [{ label: `Buy (£${lowprice.toLocaleString()})`, action: () => setGs((p) => {
                      const inv = [...p.inventory]; const avg = [...p.avgCost];
                      const oldTotal = avg[itemIdx] * inv[itemIdx]; inv[itemIdx] += qty;
                      avg[itemIdx] = Math.round((oldTotal + lowprice) / inv[itemIdx]);
                      return { ...p, cash: p.cash - lowprice, inventory: inv, avgCost: avg, popup: null, eventMsg: `Bought ${qty} ${itemName} for £${lowprice.toLocaleString()}`, eventType: "good" };
                    })}, { label: "No thanks", action: "dismiss" }]
                  : [{ label: prev.cash < lowprice ? "Can't afford it!" : "No room!", action: "dismiss" }]
              )};
            });
          } return;
        }

        case "police_search":
          SFX.police();
          setGs((prev) => {
            const hasGear = totalInventory(prev.inventory) > 0;

            if (!hasGear) {
              return { ...prev, policeCount: prev.policeCount + 1, eventMsg: "Police searched you — clean!", eventType: "good",
                popup: mkPopup(ev.title, ev.icon, msg + "\n\nNothing found. You walk free.", [{ label: "Phew!", action: "dismiss" }]) };
            }

            // Has gear — build options
            const options = [];

            // Mention Shifty option (only if has uses AND not on cooldown)
            if (prev.shiftyUses > 0 && prev.shiftyCooldown <= 0) {
              options.push({ label: `🐷 Mention Shifty (${prev.shiftyUses} left)`, primary: true, action: () => {
                const cooldown = 3 + Math.floor(Math.random() * 2);
                setGs((p) => ({ ...p, shiftyUses: p.shiftyUses - 1, shiftyCooldown: cooldown, popup: null,
                  eventMsg: "You dropped Shifty's name. The feds winked and let you through.", eventType: "good" }));
                fireMilestone("shifty", "🐷", "Shifty came through. Worth every penny.");
              }});
            }

            const shiftyAvail = prev.shiftyUses > 0 && prev.shiftyCooldown <= 0;
            options.push({ label: "🏃 Run", primary: !shiftyAvail, action: () => {
              const escaped = Math.random() < 0.35;
              if (escaped) {
                setGs((p) => ({ ...p, popup: null, eventMsg: "You legged it! Got away clean.", eventType: "good", reputation: p.reputation + 3 }));
                fireMilestone("escaped", "🏃", "Left them in the dust.");
              } else {
                setGs((p) => {
                  const inv = [...p.inventory]; const avg = [...p.avgCost];
                  let maxIdx = 0; inv.forEach((q, i) => { if (q > inv[maxIdx]) maxIdx = i; });
                  const lost = Math.ceil(inv[maxIdx] * (0.7 + Math.random() * 0.1));
                  inv[maxIdx] = Math.max(0, inv[maxIdx] - lost);
                  if (inv[maxIdx] === 0) avg[maxIdx] = 0;
                  const fine = Math.min(Math.floor(p.cash * 0.2), p.cash);
                  const newDay = Math.min(p.day + 1, MAX_DAYS);
                  return { ...p, inventory: inv, avgCost: avg, cash: p.cash - fine, day: newDay, popup: null,
                    eventMsg: `Caught running! Lost ${lost} ${ITEMS[maxIdx].name}, fined £${fine.toLocaleString()}. Night in the cells — lost a day.`, eventType: "bad" };
                });
              }
            }});

            options.push({ label: "🗑️ Dump everything", action: () => {
              setGs((p) => ({
                ...p, inventory: ITEMS.map(() => 0), avgCost: ITEMS.map(() => 0), popup: null, dumpCount: p.dumpCount + 1,
                eventMsg: "You dumped everything before they got to you. Clean, but empty-handed.", eventType: "bad",
              }));
            }});

            options.push({ label: "🤲 Surrender", action: () => {
              setGs((p) => {
                const inv = [...p.inventory]; const avg = [...p.avgCost];
                let maxIdx = 0; inv.forEach((q, i) => { if (q > inv[maxIdx]) maxIdx = i; });
                const lost = Math.ceil(inv[maxIdx] * (0.6 + Math.random() * 0.2));
                inv[maxIdx] = Math.max(0, inv[maxIdx] - lost);
                if (inv[maxIdx] === 0) avg[maxIdx] = 0;
                const newDay = Math.min(p.day + 1, MAX_DAYS);
                return { ...p, inventory: inv, avgCost: avg, day: newDay, popup: null,
                  eventMsg: `Surrendered. They seized ${lost} ${ITEMS[maxIdx].name}. Night in the cells — lost a day.`, eventType: "bad" };
              });
            }});

            return { ...prev, policeCount: prev.policeCount + 1, eventMsg: msg, eventType: "bad",
              popup: mkPopup(ev.title, ev.icon, msg + "\n\nYou've got gear on you. This is bad. What do you do?", options) };
          }); return;

        case "cheap_offer":
          setGs((prev) => {
            const space = prev.capacity - totalInventory(prev.inventory);
            const canBuy = prev.cash >= lowprice && space >= qty;
            return { ...prev, eventMsg: msg, eventType: "neutral", popup: mkPopup(ev.title, ev.icon, msg,
              canBuy
                ? [{ label: `Buy (£${lowprice.toLocaleString()})`, action: () => setGs((p) => {
                    const inv = [...p.inventory]; const avg = [...p.avgCost];
                    const oldTotal = avg[itemIdx] * inv[itemIdx]; inv[itemIdx] += qty;
                    avg[itemIdx] = Math.round((oldTotal + lowprice) / inv[itemIdx]);
                    return { ...p, cash: p.cash - lowprice, inventory: inv, avgCost: avg, popup: null, eventMsg: `Bought ${qty} ${itemName} for £${lowprice.toLocaleString()}`, eventType: "good" };
                  })}, { label: "Walk away", action: "dismiss" }]
                : [{ label: prev.cash < lowprice ? "Can't afford it" : "No room", action: "dismiss" }]
            )};
          }); return;

        case "tip": {
          // Determine if tip is about high prices (sell opportunity) or low prices (buy opportunity)
          const isExpensive = msg.includes("expensive") || msg.includes("blow up") || msg.includes("skyrocket") || msg.includes("top dollar");
          setGs((p) => ({
            ...p, eventMsg: msg, eventType: "good", eventFades: true,
            activeTip: { itemIdx, borough: tipBoroughIdx, location: tipLocIdx, type: isExpensive ? "expensive" : "cheap" },
            popup: mkPopup(ev.title, ev.icon, msg, [{ label: "Good looking out", action: "dismiss" }]),
          })); return;
        }

        case "free_cash":
          SFX.lucky();
          setGs((p) => ({ ...p, cash: p.cash + bigcash, eventMsg: `Found £${bigcash.toLocaleString()}!`, eventType: "good", popup: mkPopup(ev.title, ev.icon, msg, [{ label: "Nice one!", action: "dismiss" }]) })); return;

        case "mugging":
          // Jamal blocks mugging
          if (jamalRef.current && jamalBlocksRef.current > 0) {
            setGs((prev) => {
              const newBlocks = prev.jamalBlocks - 1;
              const jamalGone = newBlocks <= 0;
              const cooldown = jamalGone ? 5 + Math.floor(Math.random() * 4) : 0;
              return { ...prev, jamalBlocks: newBlocks, muggingCount: prev.muggingCount + 1,
                jamalActive: !jamalGone, jamalCooldown: cooldown,
                eventMsg: jamalGone ? "Jamal stepped up — but then had to dip. He's gone ghost." : "Jamal stepped up. They clocked him and backed off.",
                eventType: "good",
                popup: mkPopup("Trouble!", "🔪", jamalGone
                  ? "Some yutes tried it. Jamal handled them — but feds were watching. He had to run.\n\nJamal's gone ghost. He'll be back when things cool down."
                  : "Some yutes tried it. Jamal stepped forward and they backed off.\n\n\"Not today, fam.\"",
                  [{ label: jamalGone ? "Safe Jamal" : "My guy", action: "dismiss" }]) };
            });
            return;
          }
          SFX.trouble();
          setGs((prev) => {
            // Cash loss is 15-30% of what you're carrying — banking is strategic
            const pct = 0.15 + Math.random() * 0.15;
            const actual = Math.min(prev.cash, Math.max(50, Math.floor(prev.cash * pct)));
            const inv = [...prev.inventory]; const avg = [...prev.avgCost];
            const carrying = inv.reduce((a, b) => a + b, 0);
            if (carrying > 0) {
              const targetIdx = inv.findIndex((q, i) => q > 0 && (itemIdx === i || Math.random() < 0.5)) !== -1
                ? inv.findIndex((q, i) => q > 0 && (itemIdx === i || Math.random() < 0.5))
                : inv.findIndex((q) => q > 0);
              const lost = Math.ceil(inv[targetIdx] * (0.2 + Math.random() * 0.3));
              inv[targetIdx] = Math.max(0, inv[targetIdx] - lost);
              if (inv[targetIdx] === 0) avg[targetIdx] = 0;
              return { ...prev, cash: prev.cash - actual, inventory: inv, avgCost: avg, muggingCount: prev.muggingCount + 1,
                eventMsg: `Mugged! Lost £${actual.toLocaleString()} and ${lost} ${ITEMS[targetIdx].name}`, eventType: "bad",
                popup: mkPopup(ev.title, ev.icon, pick([
                  `They rolled up heavy. Took £${actual.toLocaleString()} and ${lost} ${ITEMS[targetIdx].name} out your jacket.`,
                  `Caught you slipping. £${actual.toLocaleString()} gone and they grabbed ${lost} ${ITEMS[targetIdx].name} too.`,
                  `Three man deep. They ran your pockets — £${actual.toLocaleString()} and ${lost} ${ITEMS[targetIdx].name}.`,
                  `They weren't playing. Lost £${actual.toLocaleString()} cash and ${lost} ${ITEMS[targetIdx].name}.`,
                ]), [{ label: "...", action: "dismiss" }]) };
            }
            return { ...prev, cash: prev.cash - actual, inventory: inv, muggingCount: prev.muggingCount + 1, eventMsg: `Mugged! Lost £${actual.toLocaleString()}`, eventType: "bad",
              popup: mkPopup(ev.title, ev.icon, pick([
                `They rolled up on you. Took £${actual.toLocaleString()} straight out your pocket.`,
                `Caught lacking. £${actual.toLocaleString()} gone before you could blink.`,
                `Two man on a moped. Ran your pockets — £${actual.toLocaleString()}.`,
                `They weren't asking. Lost £${actual.toLocaleString()}.`,
              ]), [{ label: "...", action: "dismiss" }]) };
          }); return;
      }
      return;
    }
  }, []);

  // --- GREEZY DEBT COLLECTOR ---
  const checkGreezy = useCallback(() => {
    setGs((prev) => {
      if (prev.debt <= 0 || prev.day < prev.greezyDay || prev.popup) return prev;

      if (prev.greezyStage === 0) {
        // Stage 1: Warning message
        const nextDay = prev.day + 8 + Math.floor(Math.random() * 5);
        return { ...prev, greezyStage: 1, greezyDay: nextDay,
          eventMsg: `Your boy messaged: "Yo, I seen Greezy yesterday, says you owe him £${prev.debt.toLocaleString()}. Watch yourself."`, eventType: "bad",
          popup: mkPopup("Message Received", "📱",
            `You got a text from one of your mandem:\n\n"Yo fam, I seen Greezy yesterday. He's asking about you. Says you owe him £${prev.debt.toLocaleString()}. I'd sort that out if I was you."`,
            [{ label: "Say less", action: "dismiss" }]) };
      }

      if (prev.greezyStage === 1) {
        // Stage 2: First visit — takes items + cash
        const inv = [...prev.inventory]; const avg = [...prev.avgCost];
        const carrying = inv.reduce((a, b) => a + b, 0);
        if (carrying > 0) {
          const targetIdx = inv.findIndex((q) => q > 0);
          const lost = Math.ceil(inv[targetIdx] * (0.3 + Math.random() * 0.3));
          inv[targetIdx] = Math.max(0, inv[targetIdx] - lost);
          if (inv[targetIdx] === 0) avg[targetIdx] = 0;
        }
        const cashTaken = Math.min(Math.floor(prev.cash * 0.3), prev.cash);
        const nextDay = prev.day + 6 + Math.floor(Math.random() * 5);
        return { ...prev, greezyStage: 2, greezyDay: nextDay, cash: prev.cash - cashTaken, inventory: inv, avgCost: avg,
          eventMsg: carrying > 0 ? "Greezy paid you a visit. Took cash and gear. Left you with a black eye." : "Greezy paid you a visit. Took your cash and left you with a black eye.", eventType: "bad",
          popup: mkPopup("Greezy", "👊",
            `Greezy caught up with you.\n\n"You think you can owe me £${prev.debt.toLocaleString()} and walk around like nothing?"\n\nHe took £${cashTaken.toLocaleString()}${carrying > 0 ? " and some of your gear" : ""}. Left you with a black eye.`,
            [{ label: "...", action: "dismiss" }]) };
      }

      if (prev.greezyStage === 2) {
        // Stage 3: Hospital — takes more items + lose a day
        const inv = [...prev.inventory]; const avg = [...prev.avgCost];
        const carrying = inv.reduce((a, b) => a + b, 0);
        if (carrying > 0) {
          for (let i = 0; i < inv.length; i++) {
            if (inv[i] > 0) {
              const lost = Math.ceil(inv[i] * (0.5 + Math.random() * 0.3));
              inv[i] = Math.max(0, inv[i] - lost);
              if (inv[i] === 0) avg[i] = 0;
            }
          }
        }
        const cashTaken = Math.min(Math.floor(prev.cash * 0.5), prev.cash);
        const newDay = Math.min(prev.day + 1, MAX_DAYS);
        const nextGreezy = newDay + 6 + Math.floor(Math.random() * 5);
        return { ...prev, greezyStage: 3, greezyDay: nextGreezy, day: newDay, cash: prev.cash - cashTaken, inventory: inv, avgCost: avg,
          eventMsg: carrying > 0 ? "Greezy's boys put you in hospital. Lost a day, cash, and most of your gear." : "Greezy's boys put you in hospital. Lost a day and your cash.", eventType: "bad",
          popup: mkPopup("Greezy's Boys", "🏥",
            `Greezy sent his boys this time.\n\n"This is what happens when you take the piss."\n\nThey took £${cashTaken.toLocaleString()}${carrying > 0 ? " and cleared out most of your stash" : ""}. You spent the night in A&E. Lost a day.`,
            [{ label: "I need to pay this off", action: "dismiss" }]) };
      }

      // Stage 3+: Greezy keeps coming back with hospital visits
      if (prev.greezyStage >= 3) {
        const inv = [...prev.inventory]; const avg = [...prev.avgCost];
        const carrying = inv.reduce((a, b) => a + b, 0);
        if (carrying > 0) {
          for (let i = 0; i < inv.length; i++) {
            if (inv[i] > 0) {
              const lost = Math.ceil(inv[i] * (0.5 + Math.random() * 0.3));
              inv[i] = Math.max(0, inv[i] - lost);
              if (inv[i] === 0) avg[i] = 0;
            }
          }
        }
        const cashTaken = Math.min(Math.floor(prev.cash * 0.5), prev.cash);
        const newDay = Math.min(prev.day + 1, MAX_DAYS);
        const nextGreezy = newDay + 5 + Math.floor(Math.random() * 4);
        return { ...prev, greezyDay: nextGreezy, day: newDay, cash: prev.cash - cashTaken, inventory: inv, avgCost: avg,
          eventMsg: "Greezy came back. Hospital again. Pay your debt.", eventType: "bad",
          popup: mkPopup("Greezy Again", "🏥",
            `Greezy's not stopping.\n\n"I told you what would happen."\n\nThey took £${cashTaken.toLocaleString()}${carrying > 0 ? " and your gear" : ""}. Another night in A&E. Another day gone. Pay the man.`,
            [{ label: "...", action: "dismiss" }]) };
      }

      return prev;
    });
  }, []);

  // --- ACHIEVEMENTS (persistent across games) ---
  const ACHIEVEMENT_LIST = [
    { key: "nw50k", icon: "£" }, { key: "nw100k", icon: "💷" },
    { key: "nw500k", icon: "💰" }, { key: "nw1m", icon: "🤑" },
    { key: "debtfree", icon: "🆓" }, { key: "bank50k", icon: "🏦" },
    { key: "moncler", icon: "🧥" }, { key: "goose", icon: "🧥" },
    { key: "escaped", icon: "🏃" }, { key: "shifty", icon: "🐷" },
    { key: "tip", icon: "🎯" }, { key: "megaspike", icon: "🔥" },
  ];

  const unlockAchievement = useCallback((key) => {
    setAchievements((prev) => {
      if (prev[key]) return prev;
      const updated = { ...prev, [key]: true };
      try { store.set("sw_achievements", JSON.stringify(updated)); } catch (e) {}
      return updated;
    });
    setNewUnlocks((prev) => ({ ...prev, [key]: Date.now() }));
  }, []);

  // --- MILESTONES (per-game toasts) ---
  const MILESTONES = [
    { key: "nw50k", icon: "£", text: "50 bags yeh? The ends are starting to notice.", check: (s) => netWorth(s) >= 50000 },
    { key: "nw100k", icon: "💷", text: "Six figures. Making big moves now.", check: (s) => netWorth(s) >= 100000 },
    { key: "nw500k", icon: "💰", text: "Half a milli. You eating good tonight.", check: (s) => netWorth(s) >= 500000 },
    { key: "nw1m", icon: "🤑", text: "Yoooo. That's an £M.", check: (s) => netWorth(s) >= 1000000 },
    { key: "debtfree", icon: "🆓", text: "Debt free. Nobody owns you now.", check: (s) => s.debt <= 0 },
    { key: "bank50k", icon: "🏦", text: "50 bags stashed. Smart money.", check: (s) => s.bank >= 50000 },
    { key: "moncler", icon: "🧥", text: "That Moncleezy tho.", check: (s) => s.jacketType === "moncler" },
    { key: "goose", icon: "🧥", text: "Dripped out. Looking like money.", check: (s) => s.jacketType === "goose" },
  ];

  // Check milestones after state changes
  useEffect(() => {
    if (gs.phase !== "playing" || gs.milestoneToast) return;
    const newMilestones = {};
    const toasts = [];
    for (const m of MILESTONES) {
      if (!gs.milestones[m.key] && m.check(gs)) {
        newMilestones[m.key] = true;
        toasts.push({ icon: m.icon, text: m.text, key: m.key });
      }
    }
    if (toasts.length > 0) {
      setGs((p) => ({
        ...p, milestones: { ...p.milestones, ...Object.fromEntries(toasts.map((t) => [t.key, true])) },
        milestoneToast: toasts,
      }));
      SFX.milestone();
      toasts.forEach((t) => unlockAchievement(t.key));
    }
  }, [gs.cash, gs.bank, gs.debt, gs.jacketType, gs.phase]);

  // Reset Greezy when debt is fully paid
  useEffect(() => {
    if (gs.phase === "playing" && gs.debt <= 0 && gs.greezyStage > 0) {
      setGs((p) => ({ ...p, greezyStage: 0 }));
    }
  }, [gs.debt, gs.phase]);

  // Fade event messages after popup dismissal
  useEffect(() => {
    if (!gs.eventFades || gs.popup || gs.eventFaded) return;
    const timer = setTimeout(() => setGs((p) => ({ ...p, eventFaded: true })), 5000);
    return () => clearTimeout(timer);
  }, [gs.eventFades, gs.popup, gs.eventFaded]);

  // Action-triggered milestones (set from event handlers)
  const fireMilestone = useCallback((key, icon, text) => {
    setGs((p) => {
      if (p.milestones[key]) return p;
      SFX.milestone();
      unlockAchievement(key);
      const existing = Array.isArray(p.milestoneToast) ? p.milestoneToast : p.milestoneToast ? [p.milestoneToast] : [];
      return { ...p, milestones: { ...p.milestones, [key]: true }, milestoneToast: [...existing, { icon, text, key }] };
    });
  }, [unlockAchievement]);

  const doTravel = useCallback((bIdx, lIdx) => {
    if (bIdx === gs.borough && lIdx === gs.location) return;
    const newDay = gs.day + 1;
    if (newDay > MAX_DAYS) { endGame(); return; }
    const newDebt = Math.round(gs.debt * (1 + DEBT_INTEREST));
    const newPrices = generatePrices();
    const newAvail = generateAvail();
    const histEntry = { day: gs.day, borough: gs.borough, location: gs.location, prices: [...gs.prices] };
    const dm = dayMsg(newDay);

    // Apply active tip if destination matches
    let tipMsg = null;
    if (gs.activeTip && gs.activeTip.borough === bIdx && gs.activeTip.location === lIdx) {
      const tip = gs.activeTip;
      if (tip.type === "expensive") {
        newPrices[tip.itemIdx] = Math.round(ITEMS[tip.itemIdx].basePrice * (2.5 + Math.random() * 1.5));
        tipMsg = `The tip was right! ${ITEMS[tip.itemIdx].name} prices are through the roof here.`;
      } else {
        newPrices[tip.itemIdx] = Math.max(1, Math.round(ITEMS[tip.itemIdx].basePrice * (0.05 + Math.random() * 0.15)));
        tipMsg = `The tip paid off! ${ITEMS[tip.itemIdx].name} is dirt cheap here.`;
      }
    }

    // Apply pending news if destination matches
    let newsMsg = null;
    if (gs.pendingNews && gs.pendingNews.borough === bIdx && gs.pendingNews.location === lIdx) {
      const news = gs.pendingNews;
      if (news.type === "mega") {
        newPrices[news.itemIdx] = Math.round(ITEMS[news.itemIdx].basePrice * (4 + Math.random() * 3));
        newsMsg = `🔥 The news was right! ${ITEMS[news.itemIdx].name} is going for insane prices here!`;
      } else if (news.type === "spike") {
        newPrices[news.itemIdx] = Math.round(ITEMS[news.itemIdx].basePrice * (2 + Math.random() * 1.5));
        newsMsg = `📰 Just like the paper said — ${ITEMS[news.itemIdx].name} prices are well up here.`;
      } else {
        newPrices[news.itemIdx] = Math.max(1, Math.round(ITEMS[news.itemIdx].basePrice * 0.1));
        newsMsg = `📰 The news was spot on — ${ITEMS[news.itemIdx].name} has crashed here.`;
      }
    }

    const arrivalMsg = tipMsg || newsMsg;
    const isMegaArrival = newsMsg && newsMsg.includes("🔥");

    // Ensure tipped/news drugs are available at destination
    if (gs.activeTip && gs.activeTip.borough === bIdx && gs.activeTip.location === lIdx) newAvail[gs.activeTip.itemIdx] = true;
    if (gs.pendingNews && gs.pendingNews.borough === bIdx && gs.pendingNews.location === lIdx) newAvail[gs.pendingNews.itemIdx] = true;

    setGs((p) => ({
      ...p, day: newDay, borough: bIdx, location: lIdx, prevPrices: p.prices, prices: newPrices, drugAvail: newAvail, debt: newDebt,
      priceHistory: [...p.priceHistory.slice(-5), histEntry],
      activeTip: null,
      pendingNews: null,
      tradeMsg: null,
      milestoneToast: null,
      shiftyCooldown: Math.max(0, p.shiftyCooldown - 1),
      jamalCooldown: Math.max(0, p.jamalCooldown - 1),
      popup: null, travelPopup: false, travelBorough: null, selectedMarket: null, selectedStash: null,
      eventMsg: arrivalMsg || dm || `Traveled to ${BOROUGHS[bIdx].locations[lIdx]}, ${BOROUGHS[bIdx].name}.${newDebt > p.debt ? ` Debt +£${(newDebt - p.debt).toLocaleString()}` : ""}`,
      eventType: arrivalMsg ? "good" : dm ? "bad" : "neutral",
      eventFades: false, eventFaded: false,
    }));
    SFX.travel();
    if (tipMsg) fireMilestone("tip", "🎯", "The streets talk. You listened.");
    if (isMegaArrival) fireMilestone("megaspike", "🔥", "Right place, right time.");
    setTimeout(triggerEvent, 150);
    setTimeout(checkGreezy, 400);
  }, [gs.day, gs.borough, gs.location, gs.debt, gs.prices, gs.activeTip, gs.pendingNews, triggerEvent, checkGreezy]);

  const doBuy = useCallback((idx, amt) => {
    const cost = amt * gs.prices[idx];
    const space = gs.capacity - totalInventory(gs.inventory);
    if (cost > gs.cash) { setGs((p) => ({ ...p, tradeMsg: `Can't afford ${amt} ${ITEMS[idx].name}! Need £${cost.toLocaleString()}`, qtyPopup: null })); return; }
    if (amt > space) { setGs((p) => ({ ...p, tradeMsg: `No jacket space! Room for ${space} more.`, qtyPopup: null })); return; }
    setGs((p) => {
      const inv = [...p.inventory]; const avg = [...p.avgCost];
      const oldTotal = avg[idx] * inv[idx]; inv[idx] += amt;
      avg[idx] = Math.round((oldTotal + cost) / inv[idx]);
      return { ...p, cash: p.cash - cost, inventory: inv, avgCost: avg, qtyPopup: null, reputation: p.reputation + 1, tradeCount: p.tradeCount + 1,
        tradeMsg: `Bought ${amt} ${ITEMS[idx].name} for £${cost.toLocaleString()}` };
    });
    SFX.buy();
  }, [gs.prices, gs.cash, gs.capacity, gs.inventory]);

  const doSell = useCallback((idx, amt) => {
    if (amt > gs.inventory[idx]) { setGs((p) => ({ ...p, tradeMsg: `You only have ${gs.inventory[idx]} ${ITEMS[idx].name}!`, qtyPopup: null })); return; }
    const revenue = amt * gs.prices[idx];
    const pl = revenue - (amt * gs.avgCost[idx]);
    setGs((p) => {
      const inv = [...p.inventory]; inv[idx] -= amt;
      const avg = [...p.avgCost]; if (inv[idx] === 0) avg[idx] = 0;
      return { ...p, cash: p.cash + revenue, inventory: inv, avgCost: avg, qtyPopup: null, reputation: p.reputation + 1, tradeCount: p.tradeCount + 1,
        tradeMsg: `Sold ${amt} ${ITEMS[idx].name} for £${revenue.toLocaleString()} (${pl >= 0 ? "+" : ""}£${pl.toLocaleString()} ${pl >= 0 ? "profit" : "loss"})` };

    SFX.sell();

  const endGame = useCallback(() => {

      try { store.set("sw_career_stats", JSON.stringify(updated)); } catch (e) {}

    // Submit best score to Supabase leaderboard

            <div style={{ borderTop: `1px solid ${T.border}`, marginTop: 8, paddingTop: 8, fontFamily: font, fontSize: 11, color: T.textDim }}>

  // ——— MAIN GAME ———
  const space = gs.capacity - totalInventory(gs.inventory);

  const eventBorder = gs.eventType === "good" ? "1px solid rgba(139,171,30,0.3)" : gs.eventType === "bad" ? "1px solid rgba(221,68,68,0.3)" : `1px solid ${T.border}`;

        <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
@keyframes fadeMsg { 0% { opacity: 1; } 60% { opacity: 1; } 100% { opacity: 0; } }
@keyframes achGlow { 0% { box-shadow: 0 0 12px rgba(242,138,31,0.8); border-color: #f28a1f; } 70% { box-shadow: 0 0 8px rgba(242,138,31,0.4); } 100% { box-shadow: none; border-color: #555555; } }`}</style>

        {/* CENTER BUTTONS — always on top on mobile */}
        {isMobile && (
          <div style={{ display: "flex", gap: 6, width: "100%" }}>
            <button style={{ ...btnStyle(false), flex: 1, fontSize: 11, padding: "6px" }} onClick={() => setGs((p) => ({ ...p, financePopup: true }))}>Finances</button>
            <button style={{ ...btnStyle(false), flex: 1, fontSize: 11, padding: "6px" }} onClick={() => setGs((p) => ({ ...p, shopPopup: true }))}>🛒 Shop</button>
            <button style={{ ...btnStyle(false), flex: 1, fontSize: 11, padding: "6px" }} onClick={() => setGs((p) => ({ ...p, priceHistoryPopup: true }))}>📊 History</button>
            {gs.day === MAX_DAYS && (
              <button style={{ ...btnStyle(true), flex: 1, fontSize: 11, padding: "6px", background: T.red, color: T.white }} onClick={endGame}>Cash Out</button>
            )}
          </div>
        )}

        {/* DRUG PANELS — always side by side */}
        <div style={{ display: "flex", gap: 8, flexDirection: "row" }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: isMobile ? 10 : 11, fontWeight: 700, color: T.text, marginBottom: 4, textTransform: "uppercase", letterSpacing: 1 }}>Available drugs to buy</div>
            <div style={{ ...panelStyle, overflow: "hidden" }}>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "14px 1fr 52px" : "20px 1fr 72px", fontFamily: font, fontSize: 10, fontWeight: 700, padding: "6px 10px", background: T.surfaceAlt, color: T.textMuted, textTransform: "uppercase", letterSpacing: 0.5, borderBottom: `1px solid ${T.border}` }}>
                <span></span><span>Drug</span><span style={{ textAlign: "right" }}>Price</span>
              </div>
              {ITEMS.map((item, i) => {
                const avail = gs.drugAvail ? gs.drugAvail[i] : true;
                if (!avail) return null;
                const up = gs.prices[i] > gs.prevPrices[i]; const down = gs.prices[i] < gs.prevPrices[i];
                const isMega = gs.prices[i] > item.basePrice * 3;
                return (
                  <div key={i} onClick={() => { setGs((p) => ({ ...p, qtyPopup: { type: "buy", itemIdx: i } })); setQtyInput(""); }}
                    style={{ display: "grid", gridTemplateColumns: isMobile ? "14px 1fr 52px" : "20px 1fr 72px", fontFamily: font, fontSize: isMobile ? 11 : 12, padding: isMobile ? "5px 6px" : "6px 10px",
                      cursor: "pointer",
                      background: isMega ? "rgba(242,138,31,0.08)" : i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.03)",
                      borderBottom: `1px solid ${T.border}`, transition: "background 0.1s" }}
                    onMouseEnter={(e) => e.currentTarget.style.background = T.accentDim}
                    onMouseLeave={(e) => e.currentTarget.style.background = isMega ? "rgba(242,138,31,0.08)" : i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.03)"}>
                    <span style={{ fontSize: 10 }}>
                      {up ? <span style={{ color: T.green }}>▲</span> : down ? <span style={{ color: T.red }}>▼</span> : <span style={{ color: T.textMuted }}>–</span>}
                    </span>
                    <span style={{ color: isMega ? T.accent : T.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{isMega ? "🔥 " : ""}{item.name}</span>
                    <span style={{ textAlign: "right", color: T.accent }}>£{gs.prices[i].toLocaleString()}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* CENTER BUTTONS — desktop only (between panels) */}
          {!isMobile && (
            <div style={{ display: "flex", flexDirection: "column", gap: 6, paddingTop: 22, width: 108, alignItems: "center" }}>
              <button style={{ ...btnStyle(false), width: "100%", fontSize: 11, padding: "6px" }} onClick={() => setGs((p) => ({ ...p, financePopup: true }))}>Finances</button>
              <button style={{ ...btnStyle(false), width: "100%", fontSize: 11, padding: "6px" }} onClick={() => setGs((p) => ({ ...p, shopPopup: true }))}>🛒 Shop</button>
              <button style={{ ...btnStyle(false), width: "100%", fontSize: 11, padding: "6px" }} onClick={() => setGs((p) => ({ ...p, priceHistoryPopup: true }))}>📊 History</button>
              {gs.day === MAX_DAYS && (
                <button style={{ ...btnStyle(true), width: "100%", fontSize: 11, padding: "6px", background: T.red, color: T.white }} onClick={endGame}>Cash Out</button>
              )}
            </div>
          )}

          {/* STASH */}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
              <span style={{ fontSize: isMobile ? 10 : 11, fontWeight: 700, color: T.text, textTransform: "uppercase", letterSpacing: 1 }}>Your stash to sell</span>
              <span style={{ fontFamily: font, fontSize: isMobile ? 10 : 11, color: T.textDim }}>{space}/{gs.capacity}</span>
            </div>
            <div style={{ ...panelStyle, overflow: "hidden", minHeight: isMobile ? 0 : 200 }}>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 30px 52px" : "1fr 40px 72px", fontFamily: font, fontSize: 10, fontWeight: 700, padding: "6px 10px", background: T.surfaceAlt, color: T.textMuted, textTransform: "uppercase", letterSpacing: 0.5, borderBottom: `1px solid ${T.border}` }}>
                <span>Drug</span><span style={{ textAlign: "right" }}>Qty</span><span style={{ textAlign: "right" }}>Avg</span>
              </div>
              {stashItems.length === 0 ? (
                <div style={{ fontFamily: font, fontSize: 12, color: T.textMuted, padding: 16, textAlign: "center" }}>Empty</div>
              ) : stashItems.map((item, i) => {
                const canSell = gs.drugAvail ? gs.drugAvail[item.idx] : true;
                return (
                <div key={item.idx} onClick={() => {
                  if (!canSell) {
                    setGs((p) => ({ ...p, tradeMsg: `No buyers for ${item.name} round here. Try another area.` }));
                    return;
                  }
                  setGs((p) => ({ ...p, qtyPopup: { type: "sell", itemIdx: item.idx } })); setQtyInput("");
                }}
                  style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 30px 52px" : "1fr 40px 72px", fontFamily: font, fontSize: isMobile ? 11 : 12, padding: isMobile ? "5px 6px" : "6px 10px",
                    cursor: "pointer",
                    background: i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.03)", borderBottom: `1px solid ${T.border}`, transition: "background 0.1s" }}
                  onMouseEnter={(e) => e.currentTarget.style.background = T.accentDim}
                  onMouseLeave={(e) => e.currentTarget.style.background = i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.03)"}>
                  <span style={{ color: T.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.name}</span>
                  <span style={{ textAlign: "right", color: T.text }}>{item.qty}</span>
                  <span style={{ textAlign: "right", color: T.accent }}>£{item.avgPrice.toLocaleString()}</span>
                </div>
                );
              })}
            </div>
          </div>
        </div>

        <div style={{ textAlign: "center", marginTop: 12 }}>
          <button style={{ ...btnStyle(false), fontSize: 11, padding: "6px 16px" }}
            onClick={() => {
              setGs((p) => ({ ...p, popup: mkPopup("What's the matter?", "🤔", "You sure you wanna quit? All progress will be lost.", [
                { label: "Quit", primary: false, action: () => { const s = getInitialState(); setGs({ ...s, phase: "title" }); } },
                { label: "Keep going", primary: true, action: "dismiss" },
              ])}));
            }}>New Game</button>
        </div>
      </div>
    </div>
  );
}


// Mount the app
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(StreetWarsLondon));
  </script>
</body>
</html>
